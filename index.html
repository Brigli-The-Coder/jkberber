<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>JK Barber Shop · Links</title>
<meta property="og:title" content="JK Barber Shop · Links">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--a1:#7c6aff;--a2:#c47eff;--glow:rgba(124,106,255,0.45);--glow2:rgba(124,106,255,0.22);--bg:#080c14;--text:#f0f4ff;--muted:rgba(240,244,255,.55);--card:rgba(255,255,255,.055);--border:rgba(255,255,255,.1)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;position:relative}
#waveBg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.vignette{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,.55) 100%);z-index:1;pointer-events:none}
.page{position:relative;z-index:2;max-width:520px;margin:0 auto;padding:64px 20px 80px;display:flex;flex-direction:column;align-items:center}
.avatar-zone{margin-bottom:28px;animation:popIn .8s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.avatar-halo{width:116px;height:116px;border-radius:50%;padding:3px;background:conic-gradient(var(--a1),var(--a2),var(--a1));animation:haloPulse 3s ease-in-out infinite,haloSpin 8s linear infinite;box-shadow:0 0 40px var(--glow),0 0 80px var(--glow2)}
@keyframes haloPulse{0%,100%{box-shadow:0 0 30px var(--glow),0 0 60px var(--glow2)}50%{box-shadow:0 0 60px var(--glow),0 0 120px var(--glow2)}}
@keyframes haloSpin{to{filter:hue-rotate(360deg)}}
.avatar-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:var(--bg);border:3px solid var(--bg);display:flex;align-items:center;justify-content:center}
.avatar-inner img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}
.avatar-initial{font-family:'Cinzel',serif;font-size:2.6rem;font-weight:700;background:linear-gradient(135deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.display-name{font-family:'Cinzel',serif;font-size:clamp(1.55rem,5vw,2.1rem);font-weight:700;text-align:center;background:linear-gradient(135deg,#fff 0%,var(--a2) 50%,var(--a1) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;letter-spacing:.04em;animation:fadeUp .7s .1s ease both;line-height:1.3}
.display-bio{color:var(--muted);font-size:.88rem;text-align:center;margin-bottom:36px;font-weight:300;letter-spacing:.04em;animation:fadeUp .7s .2s ease both;max-width:340px;line-height:1.6}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.links-wrap{width:100%;display:flex;flex-direction:column;gap:11px}
.link-card{display:flex;align-items:center;gap:15px;padding:15px 18px;background:var(--card);border:1px solid var(--border);border-radius:15px;text-decoration:none;color:var(--text);font-family:'Outfit',sans-serif;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s,border-color .3s,background .3s;position:relative;overflow:hidden;opacity:0;animation:slideIn .5s ease forwards}
.link-card::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--a1),var(--a2));opacity:0;transition:opacity .35s}
.link-card:hover{transform:translateY(-3px) scale(1.015);border-color:var(--a1);box-shadow:0 8px 32px var(--glow);background:rgba(255,255,255,.09)}
.link-card:hover::before{opacity:.08}
.link-card:active{transform:scale(.97)}
@keyframes slideIn{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}
.li-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;position:relative;z-index:1;transition:transform .3s}
.link-card:hover .li-icon{transform:scale(1.12) rotate(-3deg)}
.li-text{flex:1;position:relative;z-index:1;min-width:0}
.li-platform{font-weight:600;font-size:.93rem;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-handle{font-size:.76rem;color:var(--muted);font-weight:300;display:block;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-arrow{position:relative;z-index:1;color:var(--muted);font-size:.75rem;transition:transform .3s,color .3s;flex-shrink:0}
.link-card:hover .li-arrow{transform:translateX(5px);color:var(--a2)}
.page-footer{margin-top:52px;text-align:center;font-size:.75rem;color:rgba(240,244,255,.28);font-weight:300;letter-spacing:.06em;animation:fadeUp .7s .8s ease both}
.page-footer strong{background:linear-gradient(135deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:500}
@media(max-width:480px){.page{padding:48px 16px 60px}.display-name{font-size:1.4rem}}
</style>
</head>
<body>
<canvas id="waveBg"></canvas>
<div class="vignette"></div>
<div class="page">
  <div class="avatar-zone">
    <div class="avatar-halo">
      <div class="avatar-inner"><img src="https://www.instagram.com/jkberber?igsh=OHczanpyMmF4aTdq" alt="JK Barber Shop" onerror="this.style.display='none';document.getElementById('_fb').style.display='flex'">
        <div id="_fb" class="avatar-initial" style="display:none">J</div></div>
    </div>
  </div>
  <h1 class="display-name">JK Barber Shop</h1>
  
  <div class="links-wrap">
    <a class="link-card" href="https://instagram.com/jkberber" target="_blank" rel="noopener noreferrer" style="animation-delay:0.30s">
      <div class="li-icon" style="background:#E1306C20;color:#E1306C">
        <i class="fa-brands fa-instagram"></i>
      </div>
      <div class="li-text">
        <span class="li-platform">Instagram</span>
        <span class="li-handle">@jkberber</span>
      </div>
      <i class="fas fa-arrow-right li-arrow"></i>
    </a>
  </div>
  <div class="page-footer">Made by <strong>Brigli Bushati's Coding</strong></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
var c=document.getElementById('waveBg');
var renderer=new THREE.WebGLRenderer({canvas:c,alpha:true,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
var scene=new THREE.Scene();
var fov=window.innerWidth<500?80:65;
var camera=new THREE.PerspectiveCamera(fov,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,20,30);camera.lookAt(0,0,0);
var color3=0x7c6aff;
var COLS=72,ROWS=72,SP=0.55,COUNT=COLS*ROWS;
var bX=new Float32Array(COUNT),bZ=new Float32Array(COUNT);
var p1=new Float32Array(COUNT*3),p2=new Float32Array(COUNT*3);
for(var r=0;r<ROWS;r++){for(var c2=0;c2<COLS;c2++){var i=r*COLS+c2;var x=(c2-COLS/2)*SP;var z=(r-ROWS/2)*SP;bX[i]=x;bZ[i]=z;p1[i*3]=p2[i*3]=x;p1[i*3+1]=p2[i*3+1]=0;p1[i*3+2]=p2[i*3+2]=z;}}
var g1=new THREE.BufferGeometry();g1.setAttribute('position',new THREE.BufferAttribute(p1,3));
var g2=new THREE.BufferGeometry();g2.setAttribute('position',new THREE.BufferAttribute(p2,3));
var m1=new THREE.PointsMaterial({color:color3,size:0.07,transparent:true,opacity:0.55,sizeAttenuation:true});
var m2=new THREE.PointsMaterial({color:color3,size:0.18,transparent:true,opacity:0.18,sizeAttenuation:true});
var lp=[],lm=new THREE.LineBasicMaterial({color:color3,transparent:true,opacity:0.06});
for(var r2=0;r2<ROWS-1;r2++){for(var c3=0;c3<COLS-1;c3++){var ii=r2*COLS+c3,ii2=r2*COLS+c3+1,ii3=(r2+1)*COLS+c3;lp.push(bX[ii],0,bZ[ii],bX[ii2],0,bZ[ii2]);lp.push(bX[ii],0,bZ[ii],bX[ii3],0,bZ[ii3]);}}
var lg=new THREE.BufferGeometry();lg.setAttribute('position',new THREE.BufferAttribute(new Float32Array(lp),3));
var pts1=new THREE.Points(g1,m1),pts2=new THREE.Points(g2,m2),lines=new THREE.LineSegments(lg,lm);
scene.add(pts1,pts2,lines);
var lpArr=lg.attributes.position.array;
var raf;
function anim(){raf=requestAnimationFrame(anim);var t=Date.now()*0.001;var pa=g1.attributes.position.array;var pb=g2.attributes.position.array;var li=0;
for(var j=0;j<COUNT;j++){var xx=bX[j],zz=bZ[j];var y=Math.sin(xx*0.38+t*0.65)*Math.cos(zz*0.28+t*0.48)*2.4+Math.sin((xx+zz)*0.18+t*0.35)*1.1;pa[j*3+1]=pb[j*3+1]=y;}
for(var r3=0;r3<ROWS-1;r3++){for(var c4=0;c4<COLS-1;c4++){var ia=r3*COLS+c4,ib=r3*COLS+c4+1,ic=(r3+1)*COLS+c4;lpArr[li]=bX[ia];lpArr[li+1]=pa[ia*3+1];lpArr[li+2]=bZ[ia];lpArr[li+3]=bX[ib];lpArr[li+4]=pa[ib*3+1];lpArr[li+5]=bZ[ib];li+=6;lpArr[li]=bX[ia];lpArr[li+1]=pa[ia*3+1];lpArr[li+2]=bZ[ia];lpArr[li+3]=bX[ic];lpArr[li+4]=pa[ic*3+1];lpArr[li+5]=bZ[ic];li+=6;}}
g1.attributes.position.needsUpdate=true;g2.attributes.position.needsUpdate=true;lg.attributes.position.needsUpdate=true;
var sr=t*0.025;pts1.rotation.y=pts2.rotation.y=lines.rotation.y=sr;
renderer.render(scene,camera);}
anim();
window.addEventListener('resize',function(){renderer.setSize(window.innerWidth,window.innerHeight);camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();});
document.addEventListener('visibilitychange',function(){if(document.hidden)cancelAnimationFrame(raf);else anim();});
})();
</script>
</body>
</html>
